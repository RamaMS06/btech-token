[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "btech-tokens"
version = "1.0.0-rc.7"
description = "BTech design tokens for Python UI consumers (Streamlit, Gradio, NiceGUI, ...)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "BUMA — BTech Design System" }]
keywords = ["design-tokens", "design-system", "streamlit", "gradio", "nicegui", "btech"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]

[tool.hatch.build.targets.wheel]
packages = ["btech_tokens"]

[tool.hatch.build.targets.sdist]
include = ["btech_tokens", "README.md", "pyproject.toml"]
