[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "btech-tokens-bspace"
version = "1.0.1"
description = "BTech design tokens — bspace tenant — auto-generated, do not edit"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
authors = [{ name = "BUMA — BTech Design System" }]
keywords = ["design-tokens", "design-system", "btech", "bspace"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]

[tool.hatch.build.targets.wheel]
packages = ["btech_tokens_bspace"]

[tool.hatch.build.targets.sdist]
include = ["btech_tokens_bspace", "README.md", "pyproject.toml"]
