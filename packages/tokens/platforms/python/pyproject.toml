[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "btech-tokens"
version         = "0.0.1"
description     = "BTech Design System — resolved design tokens for Python / Streamlit"
requires-python = ">=3.10"
license         = { text = "MIT" }

[project.optional-dependencies]
dev = ["pytest>=7", "streamlit>=1.35"]

[tool.setuptools.packages.find]
where = ["."]
include = ["btech_tokens*"]

[tool.setuptools.package-data]
btech_tokens = ["py.typed"]
