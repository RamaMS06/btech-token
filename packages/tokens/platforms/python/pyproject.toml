[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name            = "btech-tokens"
# Version is kept in sync with @btech/tokens (web) by scripts/bump-version.ts.
# Increment on every release — do not edit manually.
version         = "0.0.1"
description     = "BTech Design System — resolved design tokens for Python / Streamlit"
readme          = "README.md"
requires-python = ">=3.10"
license         = { text = "MIT" }
keywords        = ["design-tokens", "btech", "buma", "streamlit"]

[project.optional-dependencies]
dev = ["pytest>=7", "streamlit>=1.35"]

[tool.setuptools.packages.find]
where = ["."]
include = ["btech_tokens*"]

[tool.setuptools.package-data]
btech_tokens = ["py.typed"]
