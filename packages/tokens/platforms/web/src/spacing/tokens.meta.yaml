category: "spacing"
figma:
  collection: "BTech/Spacing"
  tokens:
    - path: "spacing.2xs"
      figmaVariable: "Spacing/2xs"
    - path: "spacing.xs"
      figmaVariable: "Spacing/Xs"
    - path: "spacing.sm"
      figmaVariable: "Spacing/Sm"
    - path: "spacing.md"
      figmaVariable: "Spacing/Md"
    - path: "spacing.lg"
      figmaVariable: "Spacing/Lg"
    - path: "spacing.xl"
      figmaVariable: "Spacing/Xl"
    - path: "spacing.2xl"
      figmaVariable: "Spacing/2xl"
    - path: "spacing.3xl"
      figmaVariable: "Spacing/3xl"
