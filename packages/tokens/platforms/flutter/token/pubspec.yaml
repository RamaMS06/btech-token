name: btech_tokens
description: Multi-tenant design tokens for Flutter — generated by @btech/design-system
version: 1.0.1
homepage: https://github.com/RamaMS06/btech-token

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  fonts:
    - family: Geist
      fonts:
        - asset: fonts/Geist/Geist-Regular.ttf
        - asset: fonts/Geist/Geist-Medium.ttf
          weight: 500
        - asset: fonts/Geist/Geist-SemiBold.ttf
          weight: 600
        - asset: fonts/Geist/Geist-Bold.ttf
          weight: 700
