category: "typography"
platform: "flutter"
classes:
  - BTechFontSize
  - BTechHeading
  - BTechSubHeading
  - BTechBody
  - BTechFont
public_api:
  - "BTechFont.heading.h1 – h4"
  - "BTechFont.subheading.h5 – h7"
  - "BTechFont.body.{bold,small,medium,xSmall,italic,underline,paragraph}"
font_family: "Poppins (google_fonts)"
sizing: "logical pixels (Figma 1:1, no flutter_screenutil)"
