schemaVersion: 1
name: BTAvatarGroup
category: organisms
figmaNodeId: '504:705'
figmaUrl: https://www.figma.com/design/WANr9drWYNYbMPuT2sMeHi/Btech---Design-System?node-id=504-705
description: >
  Stacked group of BTAvatar instances with horizontal negative-margin
  overlap. Renders a "+N" overflow counter when items exceed `max`.
  Stacking offsets match Figma 504:705 specs (8/10/12/16/20/32 px per
  size).
uiConcerns:
  - identity
  - display
  - composition
relatedComponents:
  - BTAvatar
props:
  - name: items
    type: 'BTAvatarItem[]'
    required: true
    description: List of avatar payloads. Render order = left to right.
  - name: max
    type: number
    required: false
    default: '3'
    description: Maximum visible avatars before overflow counter appears.
  - name: customOverflowNumber
    type: number
    required: false
    description: Override computed overflow count (e.g. show "+99").
  - name: size
    type: BTAvatarSize
    required: false
    default: "'md'"
    description: Size applied uniformly to all avatars + overflow.
  - name: isLoading
    type: boolean
    required: false
    default: 'false'
    description: When true, all positions render as skeleton placeholders.
stackingOffsets:
  xs: -8
  sm: -10
  md: -12
  lg: -16
  xl: -20
  '2xl': -32
usage: |
  <BTAvatarGroup
    :items="[
      { name: 'Person 1', imageUrl: '...' },
      { name: 'JD' },
      { name: 'AB', color: 'pink' },
      { name: 'XY' },
      { name: 'ZZ' }
    ]"
    :max="3"
    size="md"
  />
  <!-- Renders 3 avatars + "+2" overflow counter -->
