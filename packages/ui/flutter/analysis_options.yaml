include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    # Few-shot exemplars — verbatim copies from buma-ui used as AI prompt
    # cache breakpoints. Not compiled, not part of btech_ui. They depend on
    # buma_design_system which is not a runtime dep.
    - "../../tools/slicer/few-shot/**"
  errors:
    # Adopted from buma-ui — keep the doc-comment ergonomics relaxed
    # so we don't choke on relative `[BTAvatarSize]` style refs.
    comment_references: ignore
    deprecated_member_use: ignore
    prefer_asserts_with_message: ignore
    public_member_api_docs: ignore
    avoid_redundant_argument_values: ignore
