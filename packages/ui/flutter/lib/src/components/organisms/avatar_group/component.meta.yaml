schemaVersion: 1
name: BTAvatarGroup
category: organisms
figmaNodeId: '504:705'
figmaUrl: https://www.figma.com/design/WANr9drWYNYbMPuT2sMeHi/Btech---Design-System?node-id=504-705
description: >
  Stacked group of BTAvatar widgets with horizontal negative-margin
  overlap. Renders a "+N" overflow counter when items exceed `max`.
  Stacking offsets match Figma 504:705 specs.
uiConcerns:
  - identity
  - display
  - composition
relatedComponents:
  - BTAvatar
props:
  - { name: items, type: 'List<BTAvatarItem>', required: true }
  - { name: max, type: int, required: false, default: '3' }
  - { name: customOverflowNumber, type: 'int?', required: false }
  - { name: size, type: BTAvatarSize, required: false, default: BTAvatarSize.md }
  - { name: isLoading, type: bool, required: false, default: 'false' }
stackingOffsets:
  xs: -8
  sm: -10
  md: -12
  lg: -16
  xl: -20
  xxl: -32
usage: |
  const BTAvatarGroup(
    items: [
      BTAvatarItem(name: 'Person 1', imageUrl: '...'),
      BTAvatarItem(name: 'JD'),
      BTAvatarItem(name: 'AB', color: BTAvatarColor.pink),
      BTAvatarItem(name: 'XY'),
      BTAvatarItem(name: 'ZZ'),
    ],
    max: 3,
    size: BTAvatarSize.md,
  )
  // Renders 3 avatars + "+2" overflow counter
