category: "spacing"
figma:
  collection: "BTech/Spacing"
  tokens:
    - path: "spacing.xs"
      figmaVariable: "Spacing/Xs"
    - path: "spacing.sm"
      figmaVariable: "Spacing/Sm"
    - path: "spacing.md"
      figmaVariable: "Spacing/Md"
    - path: "spacing.lg"
      figmaVariable: "Spacing/Lg"
    - path: "spacing.xl"
      figmaVariable: "Spacing/Xl"
    - path: "spacing.xl2"
      figmaVariable: "Spacing/Xl2"
    - path: "spacing.xl3"
      figmaVariable: "Spacing/Xl3"
    - path: "spacing.xl4"
      figmaVariable: "Spacing/Xl4"
