name: btech_ui
description: BTech UI component library for Flutter — sliced from Figma, tenant-aware via btech_tokens.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  btech_tokens:
    path: ../tokens/platforms/flutter/token

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
