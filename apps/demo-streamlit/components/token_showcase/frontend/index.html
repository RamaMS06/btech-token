<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTech Token Showcase</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
      background: var(--bg-page, #f3f4f6);
      color: var(--text-pri, #111827);
      padding: 16px;
      font-size: 14px;
    }

    /* ── Layout ── */
    .showcase { display: flex; flex-direction: column; gap: 12px; }

    /* ── Section header ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-ter, #9ca3af);
      margin-bottom: 6px;
    }

    /* ── Token annotation ── */
    .token-ann {
      font-size: 9px;
      font-family: monospace;
      color: var(--text-ter, #9ca3af);
      background: var(--bg-neutral, #f3f4f6);
      border-radius: 4px;
      padding: 1px 5px;
      display: inline-block;
      margin-top: 3px;
    }

    /* ── App bar mockup ── */
    .app-bar {
      background: var(--brand, #15803d);
      border-radius: var(--radius-md, 8px);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }
    .app-bar-title {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-bar-logo {
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.25);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff;
    }
    .app-bar-actions { display: flex; gap: 6px; }
    .app-bar-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer;
    }

    /* ── Two-col content ── */
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Card ── */
    .card {
      background: var(--bg-raised, #ffffff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: var(--radius-md, 8px);
      padding: 16px;
      box-shadow: var(--shadow-xs);
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-pri, #111827);
      margin-bottom: 12px;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm, 4px);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-primary {
      background: var(--brand, #15803d);
      color: var(--text-on-brand, #fff);
      border-color: var(--brand, #15803d);
    }
    .btn-secondary {
      background: transparent;
      color: var(--brand, #15803d);
      border-color: var(--stroke-primary, #15803d);
    }
    .btn-danger {
      background: var(--bg-danger, #dc2626);
      color: #fff;
      border-color: var(--bg-danger, #dc2626);
    }
    .btn-ghost {
      background: var(--bg-neutral, #f3f4f6);
      color: var(--text-sec, #6b7280);
      border-color: var(--border, #e5e7eb);
    }
    .btn[disabled] { opacity: 0.4; cursor: not-allowed; }

    /* ── Input field ── */
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sec, #6b7280);
      margin-bottom: 4px;
    }
    .input {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border, #e5e7eb);
      border-radius: var(--radius-sm, 4px);
      font-size: 13px;
      font-family: inherit;
      background: var(--bg-raised, #fff);
      color: var(--text-pri, #111827);
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--brand, #15803d); }
    .input.error { border-color: var(--bg-danger, #dc2626); }

    /* ── Badges / Pills ── */
    .badge-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge {
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-success  { background: var(--bg-success-subtle,  #f0fdf4); color: var(--text-success, #16a34a); }
    .badge-warning  { background: var(--bg-warning-subtle,  #fff7ed); color: var(--text-warning, #ea580c); }
    .badge-danger   { background: var(--bg-danger-subtle,   #fef2f2); color: var(--text-danger,  #dc2626); }
    .badge-info     { background: var(--bg-info-subtle,     #eff6ff); color: var(--text-info,    #2563eb); }
    .badge-neutral  { background: var(--bg-neutral,         #f3f4f6); color: var(--text-sec,     #6b7280); }

    /* ── Alert ── */
    .alert {
      border-radius: var(--radius-sm, 4px);
      padding: 10px 12px;
      font-size: 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border-left: 3px solid;
      margin-bottom: 8px;
    }
    .alert-success  { background: var(--bg-success-subtle, #f0fdf4); border-color: var(--text-success, #16a34a); color: var(--text-success, #16a34a); }
    .alert-warning  { background: var(--bg-warning-subtle, #fff7ed); border-color: var(--text-warning, #ea580c); color: var(--text-warning, #ea580c); }
    .alert-info     { background: var(--bg-info-subtle,    #eff6ff); border-color: var(--text-info,    #2563eb); color: var(--text-info,    #2563eb); }
    .alert-text { color: var(--text-pri, #111827); font-size: 12px; }

    /* ── Color palette ── */
    .palette-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .swatch {
      aspect-ratio: 1;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }
    .swatch-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 8px;
      font-weight: 600;
      text-align: center;
      padding: 2px 2px;
      letter-spacing: 0.03em;
    }

    /* ── Spacing ruler ── */
    .spacing-row { display: flex; align-items: flex-end; gap: 8px; }
    .sp-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .sp-bar-rect {
      background: var(--brand, #15803d);
      border-radius: 3px;
      width: 28px;
      opacity: 0.85;
    }
    .sp-label { font-size: 9px; color: var(--text-ter, #9ca3af); font-family: monospace; }

    /* ── Shadow demo ── */
    .shadow-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .shadow-chip {
      background: var(--bg-raised, #fff);
      border-radius: var(--radius-sm, 6px);
      padding: 10px 12px;
      font-size: 10px;
      font-family: monospace;
      color: var(--text-sec, #6b7280);
      flex: 1;
      min-width: 80px;
      text-align: center;
    }

    /* ── Radius demo ── */
    .radius-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .radius-chip {
      width: 44px; height: 44px;
      background: var(--bg-primary-subtle, #f0fdf4);
      border: 2px solid var(--brand, #15803d);
    }

    /* ── Type specimens ── */
    .type-row { display: flex; flex-direction: column; gap: 4px; }

    /* ── Token annotation row ── */
    .ann-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--border, #e5e7eb);
    }
    .ann-key {
      font-size: 9.5px;
      font-family: monospace;
      background: var(--bg-neutral, #f3f4f6);
      color: var(--text-sec, #6b7280);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .ann-arrow { color: var(--text-ter, #9ca3af); font-size: 10px; }
    .ann-val {
      font-size: 9.5px;
      font-family: monospace;
      color: var(--brand, #15803d);
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="showcase" id="root">Loading…</div>

<script>
// ── Streamlit component messaging ─────────────────────────────────────────────
function toStreamlit(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, data), '*');
}

window.addEventListener('message', function (e) {
  var d = e.data;
  if (!d || d.type !== 'streamlit:render') return;
  render(d.args || {});
  // Report iframe height
  setTimeout(function () {
    toStreamlit('streamlit:setFrameHeight',
      { height: document.documentElement.scrollHeight + 8 });
  }, 50);
});

// Signal ready
toStreamlit('streamlit:componentReady', { apiVersion: 1 });

// ── Helpers ────────────────────────────────────────────────────────────────────
function tok(tokens, key, fallback) {
  return tokens[key] || fallback;
}

function ann(tokens, keys) {
  return keys.map(function(k) {
    var v = tok(tokens, k, '?');
    return '<span class="ann-key">' + k + '</span>'
         + '<span class="ann-arrow">→</span>'
         + '<span class="ann-val">' + v + '</span>';
  }).join(' ');
}

function hex2rgb(hex) {
  var c = hex.replace('#','');
  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  var n = parseInt(c, 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function luminance(rgb) {
  return (0.299*rgb[0] + 0.587*rgb[1] + 0.114*rgb[2]) / 255;
}
function contrastFg(hex) {
  try { return luminance(hex2rgb(hex)) > 0.5 ? '#111827' : '#ffffff'; } catch(e) { return '#fff'; }
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(args) {
  var T = args.tokens || {};

  // Apply CSS custom properties to :root
  var cssVars = [
    ['--font-sans',           tok(T, 'typography.fontFamily.sans', 'Inter, system-ui, sans-serif')],
    ['--bg-page',             tok(T, 'color.background.surface.subtle', '#f3f4f6')],
    ['--bg-raised',           tok(T, 'color.background.surface.raised', '#ffffff')],
    ['--bg-neutral',          tok(T, 'color.background.neutral.default', '#f3f4f6')],
    ['--bg-primary-subtle',   tok(T, 'color.background.primary.subtle', '#f0fdf4')],
    ['--bg-success-subtle',   tok(T, 'color.background.success.subtle', '#f0fdf4')],
    ['--bg-warning-subtle',   tok(T, 'color.background.warning.subtle', '#fff7ed')],
    ['--bg-danger-subtle',    tok(T, 'color.background.danger.subtle', '#fef2f2')],
    ['--bg-info-subtle',      tok(T, 'color.background.info.subtle', '#eff6ff')],
    ['--bg-danger',           tok(T, 'color.background.danger.default', '#dc2626')],
    ['--brand',               tok(T, 'color.background.primary.default', '#15803d')],
    ['--brand-bold',          tok(T, 'color.background.primary.bolder', '#166534')],
    ['--text-pri',            tok(T, 'color.text.neutral.default', '#111827')],
    ['--text-sec',            tok(T, 'color.text.neutral.subtle', '#6b7280')],
    ['--text-ter',            tok(T, 'color.text.neutral.disabled', '#9ca3af')],
    ['--text-on-brand',       tok(T, 'color.text.on.primary', '#ffffff')],
    ['--text-success',        tok(T, 'color.text.success.base', '#16a34a')],
    ['--text-warning',        tok(T, 'color.text.warning.base', '#ea580c')],
    ['--text-danger',         tok(T, 'color.text.danger.base', '#dc2626')],
    ['--text-info',           tok(T, 'color.text.info.base', '#2563eb')],
    ['--border',              tok(T, 'color.stroke.neutral.default', '#e5e7eb')],
    ['--stroke-primary',      tok(T, 'color.stroke.primary.default', '#15803d')],
    ['--radius-sm',           tok(T, 'radius.sm', '8px')],
    ['--radius-md',           tok(T, 'radius.md', '12px')],
    ['--radius-lg',           tok(T, 'radius.lg', '16px')],
    ['--shadow-xs',           tok(T, 'shadow.elevation.xs', 'none')],
    ['--shadow-sm',           tok(T, 'shadow.elevation.sm', 'none')],
    ['--shadow-md',           tok(T, 'shadow.elevation.md', 'none')],
  ];
  var styleEl = document.getElementById('token-vars');
  if (!styleEl) { styleEl = document.createElement('style'); styleEl.id='token-vars'; document.head.appendChild(styleEl); }
  styleEl.textContent = ':root{' + cssVars.map(function(p){return p[0]+':'+p[1];}).join(';') + '}';

  // ── Spacing data ────────────────────────────────────────────────────────────
  var spacingKeys = ['2xs','xs','sm','md','lg','xl','2xl'];
  var spacingBars = spacingKeys.map(function(k) {
    var raw = tok(T, 'spacing.' + k, '4px');
    var px  = parseInt(raw) || 4;
    return { k: k, px: px };
  });

  // ── Core color palette ───────────────────────────────────────────────────────
  var palette = [
    { k: 'color.background.primary.default',  label: 'Brand'  },
    { k: 'color.background.primary.subtle',   label: 'Brand~' },
    { k: 'color.background.success.default',  label: 'Success' },
    { k: 'color.background.danger.default',   label: 'Danger'  },
    { k: 'color.background.warning.default',  label: 'Warning' },
    { k: 'color.background.info.default',     label: 'Info'    },
    { k: 'color.background.neutral.default',  label: 'Neutral' },
    { k: 'color.background.surface.raised',   label: 'Surface' },
    { k: 'color.text.neutral.default',        label: 'Text'    },
    { k: 'color.stroke.neutral.default',      label: 'Border'  },
  ];

  // ── Typography specimens ─────────────────────────────────────────────────────
  var typeSpecs = [
    { label: 'H1 — Display', size: 22, weight: 700, key: 'typography.heading.display.fontSize' },
    { label: 'H3 — Section',  size: 16, weight: 600, key: 'typography.heading.h3.fontSize'     },
    { label: 'Body Regular',  size: 13, weight: 400, key: 'typography.body.regular.fontSize'    },
    { label: 'Body Small',    size: 11, weight: 400, key: 'typography.body.small.fontSize'      },
  ];

  // ── Build HTML ───────────────────────────────────────────────────────────────
  var sp = spacingBars;
  var maxPx = Math.max.apply(null, sp.map(function(x){ return x.px; }));

  document.getElementById('root').innerHTML = [

    /* ── 1. App bar ── */
    '<div>',
    '<div class="section-label">app-bar  ·  color.background.primary.default · shadow.elevation.sm · radius.md</div>',
    '<div class="app-bar">',
    '  <div class="app-bar-title">',
    '    <div class="app-bar-logo">B</div>',
    '    BTech App',
    '  </div>',
    '  <div class="app-bar-actions">',
    '    <div class="app-bar-icon">🔔</div>',
    '    <div class="app-bar-icon">👤</div>',
    '  </div>',
    '</div>',
    '</div>',

    /* ── 2. Two-col: Buttons + Alerts ── */
    '<div class="content-grid">',

    /* Buttons card */
    '<div class="card">',
    '<div class="card-title">Buttons</div>',
    '<div class="btn-row">',
    '  <button class="btn btn-primary">Primary</button>',
    '  <button class="btn btn-secondary">Secondary</button>',
    '  <button class="btn btn-danger">Danger</button>',
    '  <button class="btn btn-ghost">Ghost</button>',
    '  <button class="btn btn-primary" disabled>Disabled</button>',
    '</div>',
    '<div class="ann-row">' + ann(T, [
      'color.background.primary.default',
      'color.stroke.primary.default',
      'radius.sm',
    ]) + '</div>',
    '</div>',

    /* Alerts card */
    '<div class="card">',
    '<div class="card-title">Status alerts</div>',
    '<div class="alert alert-success">✅ <span class="alert-text">Payment successful — ref #TXN-00142</span></div>',
    '<div class="alert alert-warning">⚠️ <span class="alert-text">Session expires in 5 minutes</span></div>',
    '<div class="alert alert-info">ℹ️  <span class="alert-text">3 new notifications pending</span></div>',
    '<div class="ann-row">' + ann(T, [
      'color.background.success.subtle',
      'color.background.warning.subtle',
      'color.text.success.base',
    ]) + '</div>',
    '</div>',

    '</div>', /* end content-grid */

    /* ── 3. Two-col: Form + Badges ── */
    '<div class="content-grid">',

    /* Form card */
    '<div class="card">',
    '<div class="card-title">Form elements</div>',
    '<div class="field"><label>Name</label><input class="input" value="Rama Sugiyanto" /></div>',
    '<div class="field"><label>Email</label><input class="input" value="rama@buma.co.id" /></div>',
    '<div class="field"><label>Error state</label><input class="input error" value="invalid@" /></div>',
    '<div class="ann-row">' + ann(T, [
      'color.stroke.neutral.default',
      'color.stroke.primary.default',
      'color.background.danger.default',
      'radius.sm',
    ]) + '</div>',
    '</div>',

    /* Badges + palette card */
    '<div class="card">',
    '<div class="card-title">Badges &amp; palette</div>',
    '<div class="badge-row" style="margin-bottom:10px">',
    '  <span class="badge badge-success">Active</span>',
    '  <span class="badge badge-warning">Pending</span>',
    '  <span class="badge badge-danger">Failed</span>',
    '  <span class="badge badge-info">Draft</span>',
    '  <span class="badge badge-neutral">Archived</span>',
    '</div>',
    '<div class="palette-grid">',
    palette.map(function(p) {
      var col = tok(T, p.k, '#e5e7eb');
      var fg  = contrastFg(col);
      return '<div class="swatch" style="background:' + col + '">'
           + '<div class="swatch-label" style="color:' + fg + '">' + p.label + '</div>'
           + '</div>';
    }).join(''),
    '</div>',
    '<div class="ann-row">' + ann(T, [
      'color.background.success.subtle',
      'color.background.primary.default',
    ]) + '</div>',
    '</div>',

    '</div>', /* end content-grid */

    /* ── 4. Three-col: Spacing · Shadows · Typography ── */
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">',

    /* Spacing */
    '<div class="card">',
    '<div class="card-title">Spacing</div>',
    '<div class="spacing-row">',
    sp.map(function(s) {
      var h = Math.max(6, Math.round((s.px / maxPx) * 72));
      return '<div class="sp-bar-wrap">'
           + '<div class="sp-bar-rect" style="height:' + h + 'px"></div>'
           + '<div class="sp-label">' + s.k + '<br>' + s.px + 'px</div>'
           + '</div>';
    }).join(''),
    '</div>',
    '<div class="ann-row">' + ann(T, ['spacing.sm', 'spacing.md', 'spacing.lg']) + '</div>',
    '</div>',

    /* Shadows */
    '<div class="card">',
    '<div class="card-title">Elevation</div>',
    '<div class="shadow-row">',
    ['xs','sm','md','lg'].map(function(lv) {
      var sh = tok(T, 'shadow.elevation.' + lv, 'none');
      return '<div class="shadow-chip" style="box-shadow:' + sh + '">.' + lv + '</div>';
    }).join(''),
    '</div>',
    '<div class="ann-row">' + ann(T, ['shadow.elevation.xs', 'shadow.elevation.md']) + '</div>',
    '</div>',

    /* Typography */
    '<div class="card">',
    '<div class="card-title">Typography</div>',
    '<div class="type-row">',
    typeSpecs.map(function(s) {
      return '<div style="font-size:' + s.size + 'px;font-weight:' + s.weight + ';line-height:1.3;color:var(--text-pri)">'
           + s.label
           + '</div>';
    }).join(''),
    '</div>',
    '<div class="ann-row">' + ann(T, ['typography.fontFamily.sans', 'radius.md']) + '</div>',
    '</div>',

    '</div>', /* end three-col */

  ].join('\n');
}
</script>
</body>
</html>
