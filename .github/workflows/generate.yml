name: Auto-generate token outputs

# Triggers ONLY when token source files or the generator itself changes.
# Runs generate, then commits the updated generated files back to the branch.
on:
  push:
    branches-ignore:
      - main          # main is protected — handled by validate.yml
    paths:
      - 'tokens/**'
      - 'config/sd.config.ts'

jobs:
  generate:
    name: Generate all framework outputs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push generated files back to branch

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit triggers downstream checks.
          # Falls back to GITHUB_TOKEN (won't trigger new CI run — acceptable).
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Node / pnpm ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # ── Generate ────────────────────────────────────────────────────────
      - name: Run pnpm generate
        run: pnpm generate

      # ── Flutter analyze (generated.dart + tenant.dart must be valid) ────
      - name: Flutter analyze
        run: flutter analyze packages/tokens-dart

      # ── Commit back generated files if anything changed ──────────────────
      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(generate): sync generated outputs from tokens/ changes

            Auto-generated by github-actions[bot] — do not edit generated files manually.
            Run `pnpm generate` locally to preview changes.
          file_pattern: |
            packages/tokens-dart/lib/src/generated.dart
            packages/tokens-dart/lib/src/tenant.dart
            packages/tokens-react/src/generated.ts
            packages/tokens-vue/src/generated.ts
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
