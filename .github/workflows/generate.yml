name: Auto-generate token outputs

# Triggers ONLY when token source files or the generator itself changes.
# Runs generate, then commits the updated generated files back to the branch.
on:
  push:
    branches-ignore:
      - main          # main is protected — handled by validate.yml
    paths:
      - 'packages/tokens/sources/**'
      - 'packages/tokens/sd.config.ts'

jobs:
  generate:
    name: Generate all framework outputs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push generated files back to branch

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit triggers downstream checks.
          # Falls back to GITHUB_TOKEN (won't trigger new CI run — acceptable).
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Node / pnpm ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # ── Generate ─────────────────────────────────────────────────────────
      # Run the generator directly (bypasses Turbo cache) so tenant.dart and
      # all other outputs always reflect the current tokens/ state.
      - name: Run token generator
        run: pnpm exec tsx packages/tokens/sd.config.ts

      # ── Build web package (compile src/ → dist/) ──────────────────────────
      - name: Build @btech/tokens
        run: pnpm --filter @btech/tokens build

      # ── Flutter: packages/tokens-dart ────────────────────────────────────
      - name: Flutter pub get (tokens-flutter)
        run: flutter pub get
        working-directory: packages/tokens/platforms/flutter

      - name: Flutter analyze (tokens-flutter)
        run: flutter analyze --no-fatal-infos
        working-directory: packages/tokens/platforms/flutter

      # ── Flutter: apps/demo-flutter ────────────────────────────────────────
      - name: Flutter pub get (demo-flutter)
        run: flutter pub get
        working-directory: apps/demo-flutter

      - name: Flutter analyze (demo-flutter)
        run: flutter analyze --no-fatal-infos
        working-directory: apps/demo-flutter

      # ── Commit back generated files if anything changed ───────────────────
      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(generate): sync generated outputs from tokens/ changes

            Auto-generated by github-actions[bot] — do not edit generated files manually.
            Run `pnpm exec tsx packages/tokens/sd.config.ts` locally to preview changes.
          file_pattern: |
            packages/tokens/platforms/flutter/lib/btech_tokens.dart
            packages/tokens/platforms/flutter/lib/src/color/
            packages/tokens/platforms/flutter/lib/src/spacing/
            packages/tokens/platforms/flutter/lib/src/radius/
            packages/tokens/platforms/flutter/lib/src/typography/
            packages/tokens/platforms/flutter/lib/src/tenant.dart
            packages/tokens/platforms/web/src/color/
            packages/tokens/platforms/web/src/spacing/
            packages/tokens/platforms/web/src/radius/
            packages/tokens/platforms/web/src/typography/
            packages/tokens/platforms/web/dist/styles.css
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
