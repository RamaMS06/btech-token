name: Deploy Registry to GitHub Pages

on:
  push:
    branches: [main, dev, feat/btech-cli]
    paths:
      - 'tools/registry/**'
      - 'packages/ui/**/component.meta.yaml'
      - 'packages/ui/**/src/components/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - run: pnpm install --frozen-lockfile

      - run: pnpm registry:build

      - name: Deploy to BUMA-ID/btech-registry
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.REGISTRY_DEPLOY_PAT }}
          external_repository: BUMA-ID/btech-registry
          publish_branch: gh-pages
          publish_dir: ./tools/registry/public
          force_orphan: true
