name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@btech'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: packages/tokens-dart

      # ── Validate → Build → Publish ────────────────────────────────────────
      - name: Validate tokens (JS)
        run: pnpm exec tsx tools/validators/contrast.ts && pnpm exec tsx tools/validators/boundary.ts

      - name: Build all packages
        run: pnpm build

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: packages/tokens-dart

      - name: Publish JS packages via Changesets
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
