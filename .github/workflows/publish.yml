name: Publish Packages (Manual / Emergency)

# This workflow is the MANUAL / EMERGENCY release path.
# Normal releases are handled automatically by auto-version.yml on PR merge.
#
# Use this workflow when you need to:
#   - Re-publish a version that failed mid-publish
#   - Publish a hotfix tag manually
#   - Release without going through a PR
#
# Trigger: push a v* tag manually
#   git tag v1.2.3 -m "hotfix"
#   git push origin v1.2.3

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish to GitHub Packages
    # Skip if this tag was pushed by auto-version.yml (it already published inline).
    # auto-version.yml commit message contains "[skip ci]" but tags don't carry that.
    # We use a job condition: only run if the tag was NOT created by the bot.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ramaMS06'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: packages/tokens-dart

      # ── Validate → Build → Publish ────────────────────────────────────────
      - name: Validate tokens (JS)
        run: pnpm exec tsx tools/validators/contrast.ts && pnpm exec tsx tools/validators/boundary.ts

      - name: Build all packages
        run: pnpm build

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: packages/tokens-dart

      - name: Publish @ramaMS06/tokens-web
        run: pnpm --filter @ramaMS06/tokens-web publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
