name: Auto Version & Publish

# Triggers when a PR is merged into main.
# Reads PR labels to determine semver bump type, then:
#   1. Bumps version in packages/tokens-web/package.json
#   2. Syncs version to packages/tokens-dart/pubspec.yaml (mirror versioning)
#   3. Commits version bump back to main
#   4. Creates and pushes a v* tag (triggers publish.yml)
#
# PR Label → Bump type:
#   release:major  → X+1.0.0
#   release:minor  → X.Y+1.0
#   release:patch  → X.Y.Z+1  (default — no label needed)
#   no-release     → skip entirely (docs, chore, etc.)

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  auto-version:
    name: Bump version & publish
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.labels.*.name, 'no-release')
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push version bump commit + tag
      packages: write      # publish to GitHub Packages

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN — sufficient for push within same repo.
          # The version bump commit uses [skip ci] to avoid re-triggering workflows.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node / pnpm ──────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ramaMS06'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get
        working-directory: packages/tokens-dart

      # ── Determine bump type from PR labels ───────────────────────────────
      - name: Determine bump type
        id: bump_type
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ',') }}"
          echo "PR labels: $LABELS"

          if echo "$LABELS" | grep -q "release:major"; then
            echo "type=major" >> $GITHUB_OUTPUT
            echo "Bump type: MAJOR"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Bump type: MINOR"
          else
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "Bump type: PATCH (default)"
          fi

      # ── Bump version ─────────────────────────────────────────────────────
      - name: Bump package versions
        id: version
        run: pnpm exec tsx scripts/bump-version.ts ${{ steps.bump_type.outputs.type }}

      # ── Read new version ─────────────────────────────────────────────────
      - name: Read new version
        id: new_version
        run: |
          VERSION=$(node -p "require('./packages/tokens-web/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      # ── Validate tokens ──────────────────────────────────────────────────
      - name: Validate tokens (contrast + boundary)
        run: pnpm exec tsx tools/validators/contrast.ts && pnpm exec tsx tools/validators/boundary.ts

      # ── Build all packages ───────────────────────────────────────────────
      - name: Build @ramaMS06/tokens-web
        run: pnpm build

      # ── Flutter analyze ──────────────────────────────────────────────────
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        working-directory: packages/tokens-dart

      # ── Commit version bump back to main ─────────────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add packages/tokens-web/package.json packages/tokens-dart/pubspec.yaml
          git commit -m "chore(release): bump to v${{ steps.new_version.outputs.version }} [skip ci]

          Auto-bumped by auto-version.yml after merging PR #${{ github.event.pull_request.number }}:
          '${{ github.event.pull_request.title }}'

          Bump type: ${{ steps.bump_type.outputs.type }}
          @ramaMS06/tokens-web@${{ steps.new_version.outputs.version }}
          btech_tokens ${{ steps.new_version.outputs.version }}"

      # ── Tag the release ───────────────────────────────────────────────────
      - name: Create and push tag
        run: |
          git tag ${{ steps.new_version.outputs.tag }} -m "Release ${{ steps.new_version.outputs.tag }}"
          git push origin main --follow-tags

      # ── Publish to GitHub Packages ────────────────────────────────────────
      - name: Publish @ramaMS06/tokens-web to GitHub Packages
        run: pnpm --filter @ramaMS06/tokens-web publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ Released ${{ steps.new_version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`@ramaMS06/tokens-web\` | \`${{ steps.new_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`btech_tokens\` | \`${{ steps.new_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump type:** ${{ steps.bump_type.outputs.type }}" >> $GITHUB_STEP_SUMMARY
