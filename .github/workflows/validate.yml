name: Validate Tokens

# Runs on every PR to main AND on direct pushes to main.
# Acts as the final gate before merge — generated files must be in sync.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Schema · Contrast · Boundary · Sync check · Flutter analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter / Melos ──────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      # ── Generate + sync check ────────────────────────────────────────────
      # Re-run the generator directly (bypasses Turbo cache) so the sync check
      # always compares committed files against a fresh generation from tokens/.
      - name: Run token generator
        run: pnpm exec tsx packages/tokens/sd.config.ts

      - name: Build @btech/tokens
        run: pnpm --filter @btech/tokens build

      - name: Check generated files are in sync with tokens/
        run: |
          CHANGED=$(git diff --name-only \
            packages/tokens/platforms/flutter/lib/btech_tokens.dart \
            packages/tokens/platforms/flutter/lib/src/color/ \
            packages/tokens/platforms/flutter/lib/src/spacing/ \
            packages/tokens/platforms/flutter/lib/src/radius/ \
            packages/tokens/platforms/flutter/lib/src/typography/ \
            packages/tokens/platforms/flutter/lib/src/tenant.dart \
            packages/tokens/platforms/web/src/color/ \
            packages/tokens/platforms/web/src/spacing/ \
            packages/tokens/platforms/web/src/radius/ \
            packages/tokens/platforms/web/src/typography/)

          if [ -n "$CHANGED" ]; then
            echo ""
            echo "❌  Generated files are out of sync with tokens/:"
            echo "$CHANGED"
            echo ""
            echo "    Fix: run 'pnpm generate' locally and commit the results,"
            echo "    OR push a change to tokens/ — the generate.yml workflow"
            echo "    will auto-commit the updated outputs to your branch."
            exit 1
          fi

          echo "✅  All generated files are in sync."

      # ── Token validators ─────────────────────────────────────────────────
      - name: Run JS validators (contrast + boundary)
        run: pnpm exec tsx tools/validators/contrast.ts && pnpm exec tsx tools/validators/boundary.ts

      # ── Flutter: packages/tokens-dart ────────────────────────────────────
      - name: Flutter pub get (tokens-flutter)
        run: flutter pub get
        working-directory: packages/tokens/platforms/flutter

      - name: Flutter analyze (tokens-flutter)
        run: flutter analyze --no-fatal-infos
        working-directory: packages/tokens/platforms/flutter

      # ── Flutter: apps/demo-flutter ────────────────────────────────────────
      - name: Flutter pub get (demo-flutter)
        run: flutter pub get
        working-directory: apps/demo-flutter

      - name: Flutter analyze (demo-flutter)
        run: flutter analyze --no-fatal-infos
        working-directory: apps/demo-flutter
