name: Validate Tokens

# Runs on every PR to main AND on direct pushes to main.
# Acts as the final gate before merge — generated files must be in sync.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Schema · Contrast · Boundary · Sync check · Flutter analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm ─────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── Flutter / Melos ──────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Melos bootstrap (Flutter deps)
        run: melos bootstrap

      # ── Generate + sync check ────────────────────────────────────────────
      # Re-run generate from the committed tokens source.
      # If any generated file differs from what's in the branch, the PR is stale
      # — the generate.yml workflow should have auto-committed the outputs already.
      - name: Run pnpm generate
        run: pnpm generate

      - name: Check generated files are in sync with tokens/
        run: |
          CHANGED=$(git diff --name-only \
            packages/tokens-dart/lib/src/generated.dart \
            packages/tokens-dart/lib/src/tenant.dart \
            packages/tokens-react/src/generated.ts \
            packages/tokens-vue/src/generated.ts)

          if [ -n "$CHANGED" ]; then
            echo ""
            echo "❌  Generated files are out of sync with tokens/:"
            echo "$CHANGED"
            echo ""
            echo "    Fix: run 'pnpm generate' locally and commit the results,"
            echo "    OR push a change to tokens/ — the generate.yml workflow"
            echo "    will auto-commit the updated outputs to your branch."
            exit 1
          fi

          echo "✅  All generated files are in sync."

      # ── Token validators ─────────────────────────────────────────────────
      - name: Run JS validators (contrast + boundary)
        run: tsx tools/validators/contrast.ts && tsx tools/validators/boundary.ts

      # ── Flutter analyze ──────────────────────────────────────────────────
      - name: Flutter analyze
        run: melos run analyze
