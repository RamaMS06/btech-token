name: btech_design_system
repository: https://github.com/RamaMS06/btech-token

packages:
  - packages/tokens/platforms/flutter
  - packages/tokens/platforms/flutter/tenants/*

ide:
  intellij: false

command:
  version:
    # Automatically update pubspec.yaml versions and create git tags.
    updateGitTagRefs: true
    branch: main
    # Commit message when melos version bumps packages.
    message: "chore(release): publish packages\n\n{new_package_versions}"

scripts:
  get:
    exec: flutter pub get
    description: Install Flutter dependencies for all Dart packages.

  analyze:
    exec: flutter analyze --no-fatal-infos
    description: Static analysis for all Dart packages.

  test:
    exec: flutter test
    description: Run Flutter tests for all Dart packages.

  ci:
    steps:
      - get
      - analyze
    description: Full CI check for Flutter packages (get + analyze).
