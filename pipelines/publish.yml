name: Publish Packages

# Triggered by any v* tag — whether pushed by auto-version.yml (normal flow)
# or manually by a developer (hotfix / emergency).
#
# Normal flow:
#   PR merged → auto-version.yml bumps version + pushes v* tag → this pipeline publishes
#
# Manual / emergency flow:
#   git tag v1.2.3 -m "hotfix" && git push origin v1.2.3 → this pipeline publishes
trigger:
  tags:
    include:
      - v*
  branches:
    exclude:
      - '*'   # tags only — no branch push triggers

pr: none

pool:
  vmImage: ubuntu-latest

jobs:
  - job: publish
    displayName: 'Build & Publish to Azure Artifacts'

    steps:
      # ── Node / pnpm ───────────────────────────────────────────────────────
      - task: NodeTool@0
        displayName: 'Setup Node.js 20'
        inputs:
          versionSpec: '20.x'

      - script: |
          corepack enable
          corepack prepare pnpm@9 --activate
        displayName: 'Setup pnpm 9'

      - task: npmAuthenticate@0
        displayName: 'Authenticate with Azure Artifacts'
        inputs:
          workingFile: .npmrc

      - script: pnpm install --frozen-lockfile
        displayName: 'Install JS dependencies'

      # ── Flutter ───────────────────────────────────────────────────────────
      - template: templates/flutter-setup.yml

      - script: flutter pub get
        displayName: 'Flutter pub get'
        workingDirectory: packages/tokens/platforms/flutter/token

      # ── Validate → Build → Publish ────────────────────────────────────────
      - script: pnpm exec tsx tools/validators/contrast.ts && pnpm exec tsx tools/validators/boundary.ts
        displayName: 'Validate tokens (contrast + boundary)'

      - script: pnpm --filter @btech/tokens build
        displayName: 'Build @btech/tokens'

      - script: flutter analyze --no-fatal-infos
        displayName: 'Flutter analyze'
        workingDirectory: packages/tokens/platforms/flutter/token

      # Determine dist-tag: RC versions publish to "rc", stable to "latest"
      - script: |
          VERSION=$(node -p "require('./packages/tokens/platforms/web/token/package.json').version")
          if echo "$VERSION" | grep -q '\-rc\.'; then
            echo "##vso[task.setvariable variable=NPM_TAG]rc"
          else
            echo "##vso[task.setvariable variable=NPM_TAG]latest"
          fi
        displayName: 'Determine npm dist-tag (latest vs rc)'

      # Publish base package
      - script: pnpm --filter @btech/tokens publish --no-git-checks --tag $(NPM_TAG)
        displayName: 'Publish @btech/tokens to Azure Artifacts'

      # Publish tenant packages only for stable (non-RC) releases.
      # RC releases ship only the base package; tenants follow once the API stabilises.
      - script: pnpm --filter "@btech/tokens-*" publish --no-git-checks --tag $(NPM_TAG)
        displayName: 'Publish tenant packages to Azure Artifacts'
        condition: and(succeeded(), ne(variables['NPM_TAG'], 'rc'))

      # ── Summary ───────────────────────────────────────────────────────────
      - script: |
          VERSION=$(node -p "require('./packages/tokens/platforms/web/token/package.json').version")
          if [ "$(NPM_TAG)" = "rc" ]; then
            echo "##[section]Published @btech/tokens@$VERSION (tag: rc, tenants skipped)"
          else
            echo "##[section]Published @btech/tokens@$VERSION + tenant packages (tag: $(NPM_TAG))"
          fi
        displayName: 'Publish summary'
