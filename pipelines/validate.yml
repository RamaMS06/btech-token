name: Validate Tokens

# Runs on every PR to main AND on direct pushes to main.
# Acts as the final gate before merge — generated files must be in sync.
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

jobs:
  - job: validate
    displayName: 'Schema · Contrast · Boundary · Sync check · Flutter analyze'

    steps:
      # ── Node / pnpm ─────────────────────────────────────────────────────
      - task: NodeTool@0
        displayName: 'Setup Node.js 20'
        inputs:
          versionSpec: '20.x'

      - script: |
          corepack enable
          corepack prepare pnpm@9 --activate
        displayName: 'Setup pnpm 9'

      # Auth to Azure Artifacts feed so `pnpm install` can fetch
      # @btech/tokens (tenant packages depend on it via peerDep → pnpm
      # resolves it from the feed, not workspace link, by design).
      - task: npmAuthenticate@0
        displayName: 'Authenticate with Azure Artifacts'
        inputs:
          workingFile: .npmrc

      - script: pnpm install --frozen-lockfile
        displayName: 'Install JS dependencies'

      # ── Flutter ──────────────────────────────────────────────────────────
      - template: templates/flutter-setup.yml

      # ── Generate + sync check ────────────────────────────────────────────
      # Re-run the generator directly so the sync check always compares
      # committed files against a fresh generation from tokens/.
      - script: pnpm exec tsx packages/tokens/sd.config.ts
        displayName: 'Run token generator'

      - script: pnpm --filter @btech/tokens build
        displayName: 'Build @btech/tokens'

      - script: |
          CHANGED=$(git diff --name-only packages/tokens/platforms/)

          if [ -n "$CHANGED" ]; then
            echo ""
            echo "❌  Generated files are out of sync with tokens/:"
            echo "$CHANGED"
            echo ""
            echo "    Fix: run 'pnpm generate' locally and commit the results,"
            echo "    OR push a change to tokens/ — the generate pipeline"
            echo "    will auto-commit the updated outputs to your branch."
            exit 1
          fi

          echo "✅  All generated files are in sync."
        displayName: 'Sync check — generated files match token sources'

      # ── Token + workspace validators ─────────────────────────────────────
      - script: pnpm validate
        displayName: 'Run validators (contrast + boundary + workspace-deps)'

      # ── Flutter: tokens platform only ────────────────────────────────────
      - script: flutter pub get
        displayName: 'Flutter pub get (tokens-flutter)'
        workingDirectory: packages/tokens/platforms/flutter/token

      - script: flutter analyze --no-fatal-infos
        displayName: 'Flutter analyze (tokens-flutter)'
        workingDirectory: packages/tokens/platforms/flutter/token
