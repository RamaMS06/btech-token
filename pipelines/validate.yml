name: Validate Tokens

# Runs on every PR to main/dev AND on direct pushes to main/dev.
# Acts as the final gate before merge — generated files must be in sync.
#
# Why both branches?
#   - main: stable line, validates production-bound merges
#   - dev:  rc line, validates Figma plugin PRs (the plugin defaults its
#           target branch to dev) so they show up under "Related pipelines"
#           on the PR page just like manual PRs to main do. Without this,
#           plugin-opened PRs into dev had no associated build run.
trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main
      - dev

pool:
  vmImage: ubuntu-latest

jobs:
  - job: validate
    displayName: 'Schema · Contrast · Boundary · Sync check · Flutter analyze'

    steps:
      # ── Node / pnpm ─────────────────────────────────────────────────────
      - task: NodeTool@0
        displayName: 'Setup Node.js 20'
        inputs:
          versionSpec: '20.x'

      - script: |
          corepack enable
          corepack prepare pnpm@9 --activate
        displayName: 'Setup pnpm 9'

      # Auth to Azure Artifacts feed so `pnpm install` can fetch
      # @btech/tokens (tenant packages depend on it via peerDep → pnpm
      # resolves it from the feed, not workspace link, by design).
      - task: npmAuthenticate@0
        displayName: 'Authenticate with Azure Artifacts'
        inputs:
          workingFile: .npmrc

      - script: pnpm install --frozen-lockfile
        displayName: 'Install JS dependencies'
        env:
          NODE_AUTH_TOKEN: $(System.AccessToken)

      # ── Flutter ──────────────────────────────────────────────────────────
      - template: templates/flutter-setup.yml

      # ── Generate + sync check ────────────────────────────────────────────
      # Re-run the generator directly so the sync check always compares
      # committed files against a fresh generation from tokens/.
      - script: pnpm exec tsx packages/tokens/sd.config.ts
        displayName: 'Run token generator'

      - script: pnpm --filter @btech/tokens build
        displayName: 'Build @btech/tokens'

      - script: |
          CHANGED=$(git diff --name-only packages/tokens/platforms/)

          if [ -n "$CHANGED" ]; then
            echo ""
            echo "$CHANGED"
            echo ""
            if [ "$(BUILD_REASON)" = "PullRequest" ]; then
              # PR from figma/* branch: the generate pipeline runs in parallel and
              # will auto-commit the regenerated files to this branch — the sync
              # failure is expected and transient. Emit a warning instead of a
              # hard failure so the PR is not permanently blocked.
              echo "##vso[task.logissue type=warning]⚠️  Generated files will be updated automatically by the generate pipeline."
              echo "##vso[task.logissue type=warning]Re-run this pipeline after the generate pipeline commits, or merge and it will self-heal on dev."
              echo "##vso[task.complete result=SucceededWithIssues;]Generated files out of sync — generate pipeline will fix."
            else
              # Direct push to dev/main: hard gate. Generated files MUST be
              # committed before pushing (run 'pnpm generate' locally, or let
              # the generate pipeline commit them first).
              echo "❌  Generated files are out of sync with tokens/:"
              echo "    Fix: run 'pnpm generate' locally and commit the results,"
              echo "    OR push a change to tokens/ — the generate pipeline"
              echo "    will auto-commit the updated outputs to your branch."
              exit 1
            fi
          else
            echo "✅  All generated files are in sync."
          fi
        displayName: 'Sync check — generated files match token sources'
        env:
          BUILD_REASON: $(Build.Reason)

      # ── Token + workspace validators ─────────────────────────────────────
      - script: pnpm validate
        displayName: 'Run validators (contrast + boundary + workspace-deps)'

      # ── Plugin smoke build (catches breakage before merge) ──────────────
      # Plugin lives in btech-token-studio/ and is published independently
      # via plugin-publish.yml. Validate here only checks build doesn't
      # break — it does NOT publish anything.
      - script: pnpm --filter @btech/token-studio exec tsc --noEmit
        displayName: 'Plugin type-check'

      - script: pnpm --filter @btech/token-studio build
        displayName: 'Plugin build (smoke test)'

      # ── Flutter: tokens platform only ────────────────────────────────────
      - script: flutter pub get
        displayName: 'Flutter pub get (tokens-flutter)'
        workingDirectory: packages/tokens/platforms/flutter/token

      - script: flutter analyze --no-fatal-infos
        displayName: 'Flutter analyze (tokens-flutter)'
        workingDirectory: packages/tokens/platforms/flutter/token
