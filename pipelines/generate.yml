name: Auto-generate token outputs

# Triggers ONLY when token source files or the generator itself changes.
# Runs generate, then commits the updated generated files back to the branch.
# Does NOT run on main (main is protected — validate pipeline handles that).
trigger:
  branches:
    exclude:
      - main
  paths:
    include:
      - packages/tokens/sources/**
      - packages/tokens/generators/**
      - packages/tokens/sd.config.ts

pr: none   # generate runs on push only, not on PR events

pool:
  vmImage: ubuntu-latest

jobs:
  - job: generate
    displayName: 'Generate all framework outputs'

    steps:
      - checkout: self
        persistCredentials: true
        fetchDepth: 0

      # ── Node / pnpm ─────────────────────────────────────────────────────
      - task: NodeTool@0
        displayName: 'Setup Node.js 20'
        inputs:
          versionSpec: '20.x'

      - script: |
          corepack enable
          corepack prepare pnpm@9 --activate
        displayName: 'Setup pnpm 9'

      # Auth to Azure Artifacts feed so `pnpm install` can fetch
      # @btech/tokens (tenant packages consume base from the feed by design).
      - task: npmAuthenticate@0
        displayName: 'Authenticate with Azure Artifacts'
        inputs:
          workingFile: .npmrc

      - script: pnpm install --frozen-lockfile
        displayName: 'Install JS dependencies'
        env:
          NODE_AUTH_TOKEN: $(System.AccessToken)

      # ── Flutter ──────────────────────────────────────────────────────────
      - template: templates/flutter-setup.yml

      # ── Generate ─────────────────────────────────────────────────────────
      - script: pnpm exec tsx packages/tokens/sd.config.ts
        displayName: 'Run token generator'

      - script: pnpm --filter @btech/tokens build
        displayName: 'Build @btech/tokens'

      # ── Flutter: tokens platform ─────────────────────────────────────────
      - script: flutter pub get
        displayName: 'Flutter pub get (tokens-flutter)'
        workingDirectory: packages/tokens/platforms/flutter/token

      - script: flutter analyze --no-fatal-infos
        displayName: 'Flutter analyze (tokens-flutter)'
        workingDirectory: packages/tokens/platforms/flutter/token

      # ── Commit back generated files if anything changed ───────────────────
      - script: |
          git config user.name "Azure Pipelines"
          git config user.email "azure-pipelines@users.noreply.azure.com"

          git add packages/tokens/platforms/

          if git diff --cached --quiet; then
            echo "No generated files changed — nothing to commit."
            exit 0
          fi

          git commit -m "chore(generate): sync generated outputs from tokens/ changes ***NO_CI***

          Auto-generated by Azure Pipelines — do not edit generated files manually.
          Run \`pnpm generate\` locally to preview changes."

          git push origin HEAD:$(Build.SourceBranchName)
        displayName: 'Commit generated outputs'
        env:
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
